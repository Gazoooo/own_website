server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    error_page 404 /404.html;

    location = /lebenslauf.html {
        return 301 /resume.html;
    }

    location = /de/business.html {
        return 301 /de/berufliches.html;
    }

    location = /de/contact.html {
        return 301 /de/kontakt.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /404.html {
        internal;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
