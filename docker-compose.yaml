services:
  gustavotzen:
    image: nginx:1.30-alpine
    container_name: gustavotzen.de
    restart: always
    environment:
      - VIRTUAL_HOST=gustavotzen.de
      - LETSENCRYPT_HOST=gustavotzen.de
      - LETSENCRYPT_EMAIL=gustav@otzen.de
      - VIRTUAL_PORT=80
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
