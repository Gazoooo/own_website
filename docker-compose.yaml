services:
  gustavotzen:
    image: nginx:alpine
    container_name: gustavotzen.de
    restart: always
    environment:
      - VIRTUAL_HOST=gustavotzen.de
      - LETSENCRYPT_HOST=gustavotzen.de
      - LETSENCRYPT_EMAIL=gustav@otzen.de
      - VIRTUAL_PORT=80
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
